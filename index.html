<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Info - Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/bg.clg.1.avif');
            background-size: cover;
            background-position: center;
            color: black;
            font-family: 'Arial', sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-left img {
            width: 60px;
            margin-right: 10px;
        }

        .header-left h1 {
            font-size: 24px;
            color: #333;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
            padding: 0;
        }

        .navbar li a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar li a:hover,
        .navbar li a.active {
            background-color: rgb(237 180 180 / 80%);
            color: white;
        }

        .header-right .btn {
            background-color: #333;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .header-right .btn:hover {
            background-color: #555;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .container button {
            width: 100%;
            background-color: #77cd6f;
            color: white;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .container button:hover {
            background-color: #5aa95b;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <img src="img/logo.clg.2.png" alt="College Logo">
            <h1>GBDC Sehwan</h1>
        </div>

        <nav class="navbar">
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="attendence.html">Attendance</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <div class="header-right">
            <button class="btn">Help?</button>
        </div>
    </header>

    <div class="container">
        <h2>Welcome to GBDC Sehwan</h2>
        <form action="#">
            <div class="form-group">
                <label for="userName">Name:</label>
                <input type="text" id="userName" name="userName" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="userRollno">Enrollment Number:</label>
                <input type="number" id="userRollno" name="userRollno" placeholder="Enter your enrollment number"
                    required>
            </div>
            <div class="form-group">
                <label for="userContact">Contact Number:</label>
                <input type="number" id="userContact" name="userContact" placeholder="Enter your contact number"
                    required>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
